<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StellarForge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #01030a;
      color: #d0e4ff;
      font-family: "Share Tech Mono", "IBM Plex Mono", "Courier New", monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      cursor: crosshair;
      flex-shrink: 0;
      background: radial-gradient(circle at 20% 20%, rgba(64,96,160,0.08), transparent 45%), #030512;
    }
    #game-canvas:active { cursor: grabbing; }

    /* ---- UI Panel ----------------------------------------- */
    #ui-panel {
      width: 320px;
      min-width: 320px;
      background: linear-gradient(180deg, #0b1024 0%, #0a122b 35%, #071020 100%);
      border-left: 2px solid #123;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px #0c1a33;
      position: relative;
    }

    #panel-chrome {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #1a2840;
      background: linear-gradient(90deg, #0f1a35 0%, #0b1228 100%);
      box-shadow: 0 10px 18px rgba(0,0,0,0.25);
    }
    .panel-title {
      font-size: 13px;
      letter-spacing: 3px;
      color: #7fe0ff;
      text-transform: uppercase;
    }
    .panel-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #6c85b0;
      margin-top: 6px;
    }
    .panel-status {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .status-chip {
      background: #0d1730;
      border: 1px solid #23406a;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 10px;
      color: #b7d6ff;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: inset 0 0 12px rgba(0, 175, 255, 0.08);
    }
    .status-value { color: #7cffc9; font-weight: bold; }

    /* ---- Tabs --------------------------------------------- */
    #tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid #17233c;
      background: #0c1327;
    }
    .tab-btn {
      padding: 10px 4px;
      background: none;
      border: none;
      color: #55709c;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.2s;
    }
    .tab-btn:hover { color: #9ac8ff; background: rgba(70,120,200,0.08); }
    .tab-btn.active { color: #7fe0ff; border-bottom-color: #7fe0ff; background: rgba(80,180,255,0.08); }

    /* ---- Panel content ------------------------------------ */
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: none;
    }
    .panel-content::-webkit-scrollbar { width: 4px; }
    .panel-content::-webkit-scrollbar-track { background: #0a0f1f; }
    .panel-content::-webkit-scrollbar-thumb { background: #23406a; border-radius: 2px; }

    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 10px;
      letter-spacing: 2px;
      color: #6fa8ff;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .stack-list { display: flex; flex-direction: column; gap: 6px; }
    .stack-row {
      display: grid;
      grid-template-columns: 28px 1fr 60px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid #182844;
      background: #0c1325;
      border-radius: 6px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.25);
      font-size: 11px;
    }
    .stack-row .label { color: #c7dbff; }
    .stack-row .qty { justify-self: end; color: #7cffc9; font-weight: bold; }
    .stack-row .icon { font-size: 16px; text-align: center; }
    .empty { color: #3e567a; font-size: 11px; padding: 10px 6px; text-align: center; }

    .info-grid {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 10px;
      background: #0b1428;
      border: 1px solid #182844;
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
    }
    .info-label { color: #6281b2; }
    .info-value { color: #d8ecff; }

    /* ---- Crafting ----------------------------------------- */
    .active-card {
      background: linear-gradient(90deg, rgba(126,255,210,0.08), rgba(126,255,210,0));
      border: 1px solid #1e6b4d;
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
      color: #b8ffe2;
      min-height: 52px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #0b1a2c;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
      border: 1px solid #12304f;
    }
    .progress-inner {
      height: 100%;
      background: linear-gradient(90deg, #53ffd4, #7fe0ff);
    }
    .recipe-row {
      border: 1px solid #182844;
      background: #0b1325;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 11px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.25);
    }
    .recipe-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .recipe-name { color: #9ac8ff; }
    .recipe-desc { color: #6b82aa; margin-bottom: 6px; line-height: 1.4; }
    .recipe-io { color: #7cffc9; font-size: 10px; }
    .btn {
      background: #14345a;
      border: 1px solid #2e70b8;
      color: #bde2ff;
      font-family: inherit;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s;
    }
    .btn:hover { background: #1c4c83; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ---- Upgrades ----------------------------------------- */
    .upgrade-row {
      border: 1px solid #2d3458;
      background: #0d0f22;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 11px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .upgrade-title { color: #d0e4ff; font-weight: bold; }
    .upgrade-desc { color: #6b82aa; line-height: 1.4; margin-top: 4px; }
    .upgrade-meta { color: #6fa8ff; font-size: 10px; }

    /* ---- System panel ------------------------------------- */
    .station-row {
      border: 1px dashed #23406a;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      background: #0b1325;
      font-size: 11px;
      color: #c7dbff;
    }
    .station-storage { color: #7cffc9; font-size: 10px; }

    /* ---- Body info overlay -------------------------------- */
    #body-info-card {
      position: absolute;
      left: 12px;
      bottom: 12px;
      min-width: 220px;
      max-width: 280px;
      background: rgba(6, 12, 26, 0.9);
      border: 1px solid #2e70b8;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 0 20px rgba(80,160,255,0.08);
      padding: 10px;
      font-size: 11px;
      backdrop-filter: blur(2px);
      pointer-events: auto;
      color: #d0e4ff;
      display: none;
    }
    #body-info-card.visible { display: block; }
    .body-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .body-name { color: #7fe0ff; font-weight: bold; letter-spacing: 1px; }
    .ghost-btn {
      background: transparent;
      border: 1px solid #2e70b8;
      color: #9ac8ff;
      width: 22px; height: 22px;
      border-radius: 4px;
      cursor: pointer;
    }
    .body-field { color: #8fb3ff; }
    .body-value { color: #bde2ff; }
    .deposit-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(127, 224, 255, 0.1);
      border: 1px solid #2e70b8;
      border-radius: 4px;
      padding: 2px 6px;
      margin-right: 4px;
      margin-bottom: 4px;
      color: #c7dbff;
      font-size: 10px;
    }

    /* ---- Scanline tint for space-computer feel ------------ */
    #ui-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(255,255,255,0.02) 50%, transparent 50%);
      background-size: 100% 4px;
      opacity: 0.35;
      pointer-events: none;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-panel">
    <div id="panel-chrome">
      <div class="panel-title">STELLARFORGE OPS // MK-II</div>
      <div class="panel-meta">
        <span id="sim-time">T+0m 0s</span>
        <span id="system-label">SYS-000</span>
      </div>
      <div class="panel-status">
        <div class="status-chip">CARGO <span class="status-value" id="inventory-capacity">0/0</span></div>
        <div class="status-chip">HEALTH <span class="status-value" id="player-health">--</span></div>
        <div class="status-chip">DRONES <span class="status-value" id="drone-count">0</span></div>
      </div>
    </div>

    <div id="tabs">
      <button class="tab-btn active" id="tab-inventory">INVENTORY</button>
      <button class="tab-btn" id="tab-craft">CRAFT</button>
      <button class="tab-btn" id="tab-upgrades">UPGRADES</button>
      <button class="tab-btn" id="tab-systems">SYSTEM</button>
    </div>

    <div id="panel-inventory" class="panel-content" style="display:block">
      <div class="section">
        <div class="section-title">Cargo Hold</div>
        <div id="inventory-list" class="stack-list"><div class="empty">No resources collected.</div></div>
      </div>
      <div class="section">
        <div class="section-title">Vitals</div>
        <div class="info-grid">
          <div class="info-label">Position</div><div class="info-value" id="player-pos">0,0</div>
          <div class="info-label">Velocity</div><div class="info-value" id="player-vel">0</div>
          <div class="info-label">System</div><div class="info-value" id="player-system">SYS-000</div>
        </div>
      </div>
    </div>

    <div id="panel-craft" class="panel-content">
      <div class="section">
        <div class="section-title">Active Fabrication</div>
        <div id="craft-active" class="active-card">No job queued.</div>
      </div>
      <div class="section">
        <div class="section-title">Recipes</div>
        <div id="craft-list"></div>
      </div>
    </div>

    <div id="panel-upgrades" class="panel-content">
      <div class="section">
        <div class="section-title">Research</div>
        <div id="upgrade-list"></div>
      </div>
    </div>

    <div id="panel-systems" class="panel-content">
      <div class="section">
        <div class="section-title">Stations</div>
        <div id="station-list"><div class="empty">No stations detected.</div></div>
      </div>
    </div>
  </div>

  <div id="body-info-card">
    <div class="body-card-header">
      <span class="body-name" id="body-name">Celestial Body</span>
      <button class="ghost-btn" id="body-close">×</button>
    </div>
    <div id="body-details"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
